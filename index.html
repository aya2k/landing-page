<!doctype html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ahmed Ali</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>

<body class="min-h-screen bg-[#0b0b0b] text-white">

<header class="sticky top-0 z-50 border-b border-white/10 bg-black/80 backdrop-blur">
  <div class="mx-auto max-w-7xl px-6 py-4 flex items-center justify-between">
    <nav id="tabsDesktop" class="hidden md:flex gap-6 text-xs font-semibold tracking-wider"></nav>
    <div class="text-[#b08a5b] font-bold tracking-widest">AHMED ALI</div>
  </div>
</header>

<main class="mx-auto max-w-7xl px-6 py-10">
  <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
</main>

<script>
const TABS = [
  "All Projects",
  "Creative Projects",
  "Promos",
  "Commercial & Marketing",
  "Medical",
  "Education",
];

const VIDEOS = [
  { id: 1169651306, category: "Creative Projects" },
  { id: 1169649072, category: "Creative Projects" },
  { id: 1169658907, category: "Creative Projects" },
  { id: 1169642766, category: "Creative Projects" },
  { id: 1169663228, category: "Creative Projects" },
  { id: 1169661452, category: "Creative Projects" },
  { id: 1169646355, category: "Creative Projects" },
  { id: 1169653209, category: "Creative Projects" },

  { id: 1169685150, category: "Promos" },
  { id: 1169682315, category: "Promos" },

  { id: 1170003902, category: "Commercial & Marketing" },

  { id: 1169679794, category: "Medical" },
  { id: 1169681347, category: "Medical" },

  { id: 1169678868, category: "Education" },
  { id: 1169677659, category: "Education" },
  { id: 1169675728, category: "Education" },
  { id: 1169673385, category: "Education" },
  { id: 1169672422, category: "Education" },
  { id: 1169669303, category: "Education" },
  { id: 1169666057, category: "Education" },
];

const vimeoThumb = (id) => `https://vumbnail.com/${id}.jpg`;
const vimeoPage = (id) => `https://vimeo.com/${id}`;

let activeTab = "All Projects";

const tabsDesktop = document.getElementById("tabsDesktop");
const grid = document.getElementById("grid");

function renderTabs() {
  tabsDesktop.innerHTML = "";
  TABS.forEach(tab => {
    const btn = document.createElement("button");
    btn.textContent = tab.toUpperCase();
    btn.className =
      "transition " +
      (tab === activeTab ? "text-[#b08a5b]" : "text-white/60 hover:text-white");
    btn.onclick = () => {
      activeTab = tab;
      renderTabs();
      renderGrid();
    };
    tabsDesktop.appendChild(btn);
  });
}

function renderGrid() {
  grid.innerHTML = "";

  const filtered =
    activeTab === "All Projects"
      ? VIDEOS
      : VIDEOS.filter(v => v.category === activeTab);

  filtered.forEach(v => {
    const card = document.createElement("div");
    card.className =
      "cursor-pointer group relative aspect-video overflow-hidden border border-white/10 bg-black/40";

    card.innerHTML = `
      <img src="${vimeoThumb(v.id)}"
           class="absolute inset-0 h-full w-full object-cover opacity-85 group-hover:opacity-100 transition" />
      <div class="absolute inset-0 bg-black/40"></div>
      <div class="absolute inset-0 grid place-items-center">
        <div class="h-16 w-16 grid place-items-center rounded-full bg-white/10">
          <svg viewBox="0 0 24 24" class="h-6 w-6 fill-white">
            <path d="M8 5v14l11-7z"></path>
          </svg>
        </div>
      </div>
    `;

    // 👇 يفتح في نفس التبويب
    card.onclick = () => {
      window.location.href = vimeoPage(v.id);
    };

    grid.appendChild(card);
  });
}

renderTabs();
renderGrid();
</script>

</body>
</html>
